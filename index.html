<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#176b55">
  <title>Obiettivi giornalieri</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <p class="eyebrow">Pianificazione quotidiana</p>
      <h1>Obiettivi del giorno</h1>
    </header>

    <section class="date-panel" aria-labelledby="date-title">
      <div>
        <h2 id="date-title">Giorno selezionato</h2>
        <p id="selectedDateLabel" class="date-label"></p>
      </div>

      <div class="date-controls">
        <label for="datePicker">Scegli una data</label>
        <div class="date-row">
          <input type="date" id="datePicker" name="datePicker">
          <button type="button" id="todayButton" class="secondary-button">Oggi</button>
        </div>
      </div>
    </section>

    <section class="progress-panel" aria-live="polite">
      <span id="progressText">0 completate su 0</span>
      <div class="progress-bar" aria-hidden="true">
        <div id="progressFill"></div>
      </div>
    </section>

    <form id="taskForm" class="task-form">
      <label for="taskInput">Nuova attività</label>
      <div class="task-form-row">
        <input
          type="text"
          id="taskInput"
          name="taskInput"
          placeholder="Scrivi un'attività"
          autocomplete="off"
          required
        >
        <select id="categorySelect" name="categorySelect" aria-label="Categoria">
          <option value="Fisico">Fisico</option>
          <option value="Studio">Studio</option>
          <option value="Lavoro">Lavoro</option>
          <option value="Altro" selected>Altro</option>
        </select>
        <button type="submit">Aggiungi</button>
      </div>

      <fieldset class="task-type-field">
        <legend>Tipo attività</legend>
        <label class="radio-option">
          <input type="radio" name="taskType" value="single" checked>
          Attività singola
        </label>
        <label class="radio-option">
          <input type="radio" name="taskType" value="recurring">
          Attività ricorrente
        </label>
      </fieldset>

      <div id="recurringOptions" class="recurring-options" hidden>
        <div class="recurring-date-row">
          <label for="recurringStartDate">Data inizio</label>
          <input type="date" id="recurringStartDate" name="recurringStartDate">
        </div>

        <div class="recurring-date-row">
          <label for="recurringEndDate">Data fine</label>
          <input type="date" id="recurringEndDate" name="recurringEndDate">
        </div>

        <fieldset class="repeat-field">
          <legend>Ripetizione</legend>
          <label class="radio-option">
            <input type="radio" name="repeatType" value="daily" checked>
            Ogni giorno
          </label>
          <label class="radio-option">
            <input type="radio" name="repeatType" value="weekdays">
            Giorni specifici
          </label>
        </fieldset>

        <fieldset id="weekdayOptions" class="weekday-options" hidden>
          <legend>Giorni</legend>
          <label><input type="checkbox" name="weekdays" value="1"> Lun</label>
          <label><input type="checkbox" name="weekdays" value="2"> Mar</label>
          <label><input type="checkbox" name="weekdays" value="3"> Mer</label>
          <label><input type="checkbox" name="weekdays" value="4"> Gio</label>
          <label><input type="checkbox" name="weekdays" value="5"> Ven</label>
          <label><input type="checkbox" name="weekdays" value="6"> Sab</label>
          <label><input type="checkbox" name="weekdays" value="0"> Dom</label>
        </fieldset>
      </div>

      <p id="formMessage" class="form-message" aria-live="polite"></p>
    </form>

    <section class="tasks-section" aria-labelledby="tasks-title">
      <h2 id="tasks-title">Attività</h2>
      <p id="emptyMessage" class="empty-message">Nessuna attività per questo giorno</p>
      <ul id="taskList" class="task-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        let refreshing = false;

        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        navigator.serviceWorker.register("sw.js").then((registration) => {
          registration.addEventListener("updatefound", () => {
            const newWorker = registration.installing;
            if (!newWorker) return;

            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                newWorker.postMessage({ type: "SKIP_WAITING" });
              }
            });
          });
        });
      });
    }
  </script>
</body>
</html>
